version: 1.0
runtime: python311
build:
  commands:
    build:
      - python3 -m pip install --upgrade pip
      - python3 -m pip install -r requirements.txt --target python_libs
run:
  command: python3 -m uvicorn src.api.main:app --host 0.0.0.0 --port 8080
  network:
    port: 8080
  env:
    - name: BEDROCK_MODEL_ID
      value: "amazon.nova-lite-v1:0"
    - name: AWS_REGION
      value: "us-east-1"
    - name: PYTHONPATH
      value: "python_libs:."
